<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roshan Academy | Attendance</title>
    <link rel="icon" type="image/x-icon" href="images/faviocn.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center bg-cover bg-center bg-no-repeat bg-fixed" style="background-image: url('images/Quiz-Background.jpg')">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>

    <div id="login-screen" class="relative z-10 bg-white/95 backdrop-blur-md p-10 rounded-3xl shadow-2xl w-full max-w-md mx-4 transition-all duration-500">
      <div class="text-center mb-8">
        <h2 class="text-4xl font-extrabold text-blue-600 tracking-tighter">Roshan Academy</h2>
        <p class="text-gray-400 mt-1 font-bold uppercase text-[10px] tracking-[0.2em]">Attendance System</p>
      </div>
      <div class="relative mb-6">
        <input type="password" id="master-pass" placeholder="Master Password" class="w-full p-4 bg-gray-50 border-none ring-1 ring-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-center text-lg font-semibold transition-all" />
        <button id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600"><i class="fas fa-eye"></i></button>
      </div>
      <button id="enter-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-95">Unlock Tracker</button>
      <p id="login-error" class="text-red-500 mt-4 text-center text-sm font-bold hidden animate-pulse"><i class="fas fa-exclamation-circle mr-1"></i> Access Denied!</p>
    </div>

    <div id="attendance-screen" class="hidden relative z-10 bg-white p-6 md:p-10 rounded-[2.5rem] shadow-2xl w-full max-w-4xl mx-4 my-8 transition-all duration-500">
      
      <div class="flex flex-col md:flex-row justify-between items-start gap-6 mb-10 pb-8 border-b border-gray-100">
        <div class="flex items-center gap-4">
          <div>
            <h2 class="text-3xl font-black text-gray-800 leading-none">Attendance<br><span class="text-blue-600">Tracker</span></h2>
            <button id="lock-btn" class="mt-4 flex items-center text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-red-500 transition-colors bg-gray-50 px-3 py-2 rounded-xl">
              <i class="fas fa-lock mr-2"></i> Lock App
            </button>
          </div>
        </div>

        <div class="bg-blue-50/50 border border-blue-100 p-5 rounded-[2rem] w-full md:w-auto">
          <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Manage Students</span>
            <button id="export-btn" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl font-bold text-xs shadow-md transition-all flex items-center gap-2">
              <i class="fas fa-file-excel"></i> Export to Excel
            </button>
          </div>
          <div class="flex gap-2">
            <input type="number" id="new-roll" placeholder="Roll" class="w-16 p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 text-sm font-bold" />
            <input type="text" id="new-name" placeholder="Student Name" class="flex-1 md:w-48 p-3 rounded-xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 text-sm font-medium" />
            <button id="add-student-btn" onclick="addStudent()" class="bg-blue-600 text-white px-5 rounded-xl hover:bg-blue-700 shadow-md transition-all">
              <i class="fas fa-plus"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
        <div class="space-y-2">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Select Date</label>
          <input type="date" id="attendance-date" class="w-full p-4 bg-gray-50 border-none ring-1 ring-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-gray-700" />
        </div>
        <div class="space-y-2">
          <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-2">Standard / Class</label>
          <div class="relative">
            <select id="attendance-std" class="w-full p-4 bg-gray-50 border-none ring-1 ring-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none appearance-none font-bold text-gray-700 cursor-pointer">
              <option value="1">1st Standard</option>
              <option value="2">2nd Standard</option>
              <option value="3">3rd Standard</option>
              <option value="4">4th Standard</option>
              <option value="5">5th Standard</option>
              <option value="6">6th Standard</option>
              <option value="7">7th Standard</option>
              <option value="8">8th Standard</option>
              <option value="9">9th Standard</option>
              <option value="10">10th Standard</option>
            </select>
            <i class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <div class="overflow-hidden ring-1 ring-gray-100 rounded-[2rem] mb-8 shadow-sm">
        <table class="w-full text-left">
          <thead>
            <tr class="bg-gray-50/50 border-b border-gray-100">
              <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Roll No</th>
              <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Student Name</th>
              <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Status</th>
              <th class="p-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-right">Action</th>
            </tr>
          </thead>
          <tbody id="attendance-body" class="divide-y divide-gray-50">
            </tbody>
        </table>
      </div>

      <button id="save-attendance" class="w-full bg-green-600 hover:bg-green-700 text-white p-5 rounded-2xl font-black text-lg shadow-xl shadow-green-100 transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
        Save Attendance <i class="fas fa-check-circle"></i>
      </button>
    </div>

    <script type="module" src="index.js"></script>
  </body>
</html>
